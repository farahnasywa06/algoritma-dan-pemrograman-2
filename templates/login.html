<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Student Management System
</title>

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/dashboard.css') }}"
>


</head>

<body class="login-body">


<div class="login-container">

    <div class="login-left">

        <h1>
            Student Management System
        </h1>

        <p>

            Sistem Manajemen Data Mahasiswa

            dengan fitur CRUD, Search,
            Sorting, Import Export,
            Analytics dan Email OTP.

        </p>

    </div>

    <div class="login-right">

        <div class="login-card">

            <h2>
                Login
            </h2>

            {% with messages = get_flashed_messages() %}

                {% if messages %}

                    <div class="alert-danger">

                        {{ messages[0] }}

                    </div>

                {% endif %}

            {% endwith %}

            <form
                method="POST"
            >

                <div class="form-group">

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        required
                    >

                </div>

                <div class="form-group">

                    <label>
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        required
                    >

                </div>

                <button
                    class="btn-primary"
                    type="submit"
                >

                    Login

                </button>

            </form>

        </div>

    </div>

</div>


</body>

</html>
