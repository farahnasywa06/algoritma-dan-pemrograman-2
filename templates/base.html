<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        {% block title %}
        Student Management System
        {% endblock %}

    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/dashboard.css') }}">
        <link rel="stylesheet"
href="https://cdn.datatables.net/2.3.8/css/dataTables.bootstrap5.css">
        <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css">

</head>

<body>

    <div class="wrapper">

        <!-- SIDEBAR -->

        <aside id="sidebar">
            <div id="sidebar-overlay"></div>
            <div class="sidebar-header">

                <h3>

                    <i class="bi bi-mortarboard-fill"></i>

                    SMS

                </h3>

            </div>

            <ul class="sidebar-nav">

                <li>
                    <a href="/dashboard" class="{% if request.path == '/dashboard' %}active-menu{% endif %}">

                        <i class="bi bi-speedometer2"></i>

                        <span>Dashboard</span>

                    </a>

                </li>

                <li>

                    <a href="/students" class="{% if request.path == '/students' %}active-menu{% endif %}">

                        <i class="bi bi-people-fill"></i>

                        <span>Mahasiswa</span>

                    </a>

                </li>

                <li>

                    <a href="/activity-log" class="{% if request.path == '/activity-log' %}active-menu{% endif %}">

                        <i class="bi bi-clock-history"></i>

                        <span>Activity Log</span>

                    </a>

                </li>

                <li>

                    <a href="/settings" class="{% if request.path == '/settings' %}active-menu{% endif %}">

                        <i class="bi bi-gear-fill"></i>

                        <span>Settings</span>

                    </a>

                </li>

                <li>

                    <a href="/logout">

                        <i class="bi bi-box-arrow-right"></i>

                        <span>Logout</span>

                    </a>

                </li>

            </ul>
        </aside>

        <!-- MAIN -->

        <div class="main">

            <!-- TOPBAR -->

            <nav class="navbar navbar-expand bg-white shadow-sm">

                <div class="container-fluid">

                    <button
                        class="btn btn-outline-primary"
                        id="toggle-btn">

                        <i class="bi bi-list"></i>

                    </button>

                    <div class="ms-auto">

                        <span class="fw-semibold">

                            Student Management System

                        </span>

                    </div>

                </div>

            </nav>

            <!-- CONTENT -->

            <div class="container-fluid p-4">

                {% block content %}
                {% endblock %}

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Sidebar Toggle -->

    <script>

        const sidebar =
    document.getElementById("sidebar");

const toggleBtn =
    document.getElementById("toggle-btn");

const overlay =
    document.getElementById("sidebar-overlay");

toggleBtn.addEventListener("click", () => {

    sidebar.classList.toggle("collapsed");

    if(window.innerWidth <= 768){

        overlay.classList.toggle("show");

    }

});

overlay.addEventListener("click", () => {

    sidebar.classList.remove("collapsed");

    overlay.classList.remove("show");

});

    </script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.datatables.net/2.3.8/js/dataTables.js"></script>

<script src="https://cdn.datatables.net/2.3.8/js/dataTables.bootstrap5.js"></script>
<script>
console.log(typeof $);
console.log(typeof $.fn.DataTable);
</script>
</body>

</html>
