<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %} Student Management System {% endblock %}</title>
    <!-- icon  -->
    <link rel="icon" href="{{ url_for('static', filename='images/icon-farah.png') }}" type="image/png" />
    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Custom CSS -->

    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.bootstrap5.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/3.0.4/css/responsive.bootstrap5.css" />
  </head>

  <body>
    <div class="wrapper">
      <!-- SIDEBAR -->
      <div id="sidebar-overlay"></div>
      <aside id="sidebar">
        <div class="sidebar-header">
          <h3>
            <i class="bi bi-mortarboard-fill"></i>
            STUDIVERSE
            <!-- <img src="{{ url_for('static', filename='images/logo-farah.png') }}" alt="" class="logo" /> -->
          </h3>
        </div>

        <ul class="sidebar-nav">
          <li>
            <a href="/dashboard" class="{% if request.path == '/dashboard' %}active-menu{% endif %}">
              <i class="bi bi-speedometer2"></i>

              <span>Dashboard</span>
            </a>
          </li>

          <li>
            <a href="/students" class="{% if request.path == '/students' %}active-menu{% endif %}">
              <i class="bi bi-people-fill"></i>

              <span>Mahasiswa</span>
            </a>
          </li>

          <li>
            <a href="/activity-log" class="{% if request.path == '/activity-log' %}active-menu{% endif %}">
              <i class="bi bi-clock-history"></i>

              <span>Activity Log</span>
            </a>
          </li>

          <li>
            <a href="/settings" class="{% if request.path == '/settings' %}active-menu{% endif %}">
              <i class="bi bi-gear-fill"></i>

              <span>Settings</span>
            </a>
          </li>

          <li>
            <a href="/logout">
              <i class="bi bi-box-arrow-right"></i>

              <span>Logout</span>
            </a>
          </li>
        </ul>
      </aside>

      <!-- MAIN -->

      <div class="main">
        <!-- TOPBAR -->

        <nav class="navbar navbar-expand bg-white shadow-sm">
          <div class="container-fluid">
            <button class="btn btn-outline-primary" id="toggle-btn">
              <i class="bi bi-list"></i>
            </button>
          </div>
        </nav>

        <!-- CONTENT -->

        <div class="container-fluid p-4">{% block content %} {% endblock %}</div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.js"></script>

    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.bootstrap5.js"></script>

    <script src="https://cdn.datatables.net/responsive/3.0.4/js/dataTables.responsive.js"></script>

    <script src="https://cdn.datatables.net/responsive/3.0.4/js/responsive.bootstrap5.js"></script>
    <!-- Sidebar Toggle -->

    <script>
      const sidebar = document.getElementById("sidebar");

      const toggleBtn = document.getElementById("toggle-btn");

      const overlay = document.getElementById("sidebar-overlay");

      toggleBtn.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");

        if (window.innerWidth <= 768) {
          overlay.classList.toggle("show");
        }
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");

        overlay.classList.remove("show");
      });
    </script>
  </body>
</html>
